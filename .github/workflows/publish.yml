name: publish
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "latest"
  workflow_dispatch:
    inputs:
        tag_name:
            description: 'Tag name to publish (default: latest)'
            required: false
            type: string
jobs:
  build:
    name: Prepare for publishing
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.resolve_tag.outputs.latest_tag }}
      target_tag: ${{ steps.resolve_tag.outputs.target_tag }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Resolve tag name
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TARGET_TAG=${{ inputs.tag_name }}
            if [ -z "$TARGET_TAG" ]; then
              TARGET_TAG=$(git tag --sort=-v:refname | head -n 1)
              echo "No tag specified. Using the latest tag: $TARGET_TAG"
            else
              echo "Using specified tag: $TARGET_TAG"
            fi
          else
            TARGET_TAG="${{ github.ref_name }}"
            echo "Triggered by push event. Using tag: $TARGET_TAG"
          fi
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          echo "Latest tag: $LATEST_TAG"
          echo "target_tag=$TARGET_TAG" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
      - name: Checkout target tag
        run: |
          git checkout "${{ steps.resolve_tag.outputs.target_tag }}"
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      - name: Install dependencies and build
        run: |
          npm install
          npm run build --if-present
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: |
            .
            !.git
            !node_modules
          include-hidden-files: true
          if-no-files-found: error
  publish-npm:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifact
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to NPM
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${CURRENT_VERSION}" version > /dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${CURRENT_VERSION} already exists on npm. Skipping publish."
            exit 0
          fi
          if [[ "${{ needs.build.outputs.latest_tag }}" == "$CURRENT_VERSION" ]]; then
            echo "Publishing version ${CURRENT_VERSION} to npm..."
            npm publish
          else
            echo "Publishing version ${CURRENT_VERSION} to npm with 'archive' tag..."
            npm publish --tag archive
          fi

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifact
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: "@haiiro2gou"
      - name: Publish to GitHub Packages
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${CURRENT_VERSION}" version > /dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${CURRENT_VERSION} already exists on GitHub Packages. Skipping publish."
            exit 0
          fi
          if [[ "${{ needs.build.outputs.latest_tag }}" == *"$CURRENT_VERSION"* ]]; then
            echo "Publishing version ${CURRENT_VERSION} to GitHub Packages..."
            npm publish
          else
            echo "Publishing version ${CURRENT_VERSION} to GitHub Packages with 'archive' tag..."
            npm publish --tag archive
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
